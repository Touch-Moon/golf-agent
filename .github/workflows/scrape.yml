name: Golf Tee Time Scrape

# ──────────────────────────────────────────────────────────────
# Schedule: Mon–Fri, Winnipeg 08:00
#   GitHub Actions cron is UTC-only, so we register both DST and
#   non-DST trigger times. GitHub's scheduler can run 1–4 hours
#   late under high load, so the in-job guard allows up to 15:00
#   Winnipeg time (07:00–15:00 window).
#
#   CDT (summer, UTC-5):  Winnipeg 07:50 = UTC 12:50
#   CST (winter, UTC-6):  Winnipeg 07:50 = UTC 13:50
# ──────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '50 12 * * *'   # CDT path — 매일 Winnipeg 07:50
    - cron: '50 13 * * *'   # CST path — 매일 Winnipeg 07:50
  workflow_dispatch:           # manual trigger from the Actions tab

concurrency:
  group: golf-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: warn
        options: >-
          --health-cmd "curl -sf http://localhost:8191/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
          --health-start-period 20s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium (no apt; ubuntu-latest already has libs)
        timeout-minutes: 5
        run: |
          # --with-deps is omitted on purpose: it triggers apt-get update which
          # has hung at azure.archive.ubuntu.com/.../noble-security in past runs
          # (2026-05-05, runs 25389378644 + 25391888741) and timed out at 20m.
          # ubuntu-latest already ships the libs Chromium needs.
          for attempt in 1 2 3; do
            python -m playwright install chromium && break
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Playwright install failed after 3 attempts"
              exit 1
            fi
            echo "::warning::Playwright install attempt $attempt failed; retrying in 15s..."
            sleep 15
          done

      - name: Winnipeg-time window guard (handles DST automatically)
        id: guard
        run: |
          HOUR=$(TZ=America/Winnipeg date +%H)
          MIN=$(TZ=America/Winnipeg date +%M)
          TOTAL=$((10#$HOUR * 60 + 10#$MIN))
          echo "Winnipeg local time: ${HOUR}:${MIN} (total ${TOTAL} min)"
          # workflow_dispatch (manual) bypasses the time window
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual dispatch — running scraper regardless of time window."
          elif [ $TOTAL -ge 420 ] && [ $TOTAL -le 900 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Within 07:00–15:00 Winnipeg window — running scraper."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipped — outside Winnipeg 07:00–15:00 window."
          fi

      - name: Run scraper
        if: steps.guard.outputs.run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          API_SECRET_KEY:     ${{ secrets.API_SECRET_KEY }}
          WEBAPP_URL:         ${{ secrets.WEBAPP_URL }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_TOKEN_V2:    ${{ secrets.NOTION_TOKEN_V2 }}
          FLARESOLVERR_URL:   http://localhost:8191/v1
          TZ: America/Winnipeg
        run: |
          mkdir -p logs
          python run.py

      - name: Push latest.json to site repo
        if: success() && steps.guard.outputs.run == 'true'
        env:
          SITE_REPO_TOKEN: ${{ secrets.SITE_REPO_TOKEN }}
        run: |
          LOGFILE=$(ls -t logs/run_*.json 2>/dev/null | head -1)
          if [ -z "$LOGFILE" ]; then
            echo "::warning::No run_YYYY-MM-DD.json under logs/, skip site update"
            exit 0
          fi
          echo "Found log: $LOGFILE"

          git clone --depth 1 \
            "https://x-access-token:${SITE_REPO_TOKEN}@github.com/Touch-Moon/good-morning-golf.git" \
            site
          cd site
          git config user.email "actions@github.com"
          git config user.name "golf-agent[bot]"

          cp "../$LOGFILE" data/latest.json
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "::notice::data/latest.json unchanged — nothing to push"
          else
            DATE=$(basename "$LOGFILE" .json | cut -c5-)
            git commit -m "data: refresh latest.json from golf-agent run ($DATE)"
            git push origin main
            echo "::notice::Pushed updated latest.json (target_date $DATE)"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
